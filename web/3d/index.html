<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <!-- 手機友善：滿版、禁縮放（搖桿／跳鈕／拖曳轉鏡頭自己處理觸控） -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>ButFun · 3D 世界（可操控真實世界客戶端）</title>
  <style>
    /* 沒風格的風格：純色背景、零美術資產，實體全在 main.js 程式生成 */
    html, body { margin: 0; height: 100%; overflow: hidden; background: #0d1117; touch-action: none; }
    #app { position: fixed; inset: 0; }

    /* HUD：線上人數 + 自己名字 + 操作提示，半透明不擋視線 */
    #hud {
      position: fixed; left: 12px; top: 12px; z-index: 10;
      font: 13px/1.5 system-ui, -apple-system, "Noto Sans CJK TC", sans-serif;
      color: #e6edf3; background: rgba(13,17,23,0.62);
      padding: 8px 12px; border-radius: 10px; max-width: 72vw;
      pointer-events: none; white-space: pre-line;
    }
    #hud b { color: #ffd54a; }
    /* 狀態浮層——連不上 WS / 找不到自己時要看得到字，不白屏 */
    #status {
      position: fixed; left: 12px; bottom: 12px; z-index: 10;
      font: 12px/1.5 system-ui, sans-serif; color: #8b949e;
      background: rgba(13,17,23,0.6); padding: 6px 10px; border-radius: 8px;
      pointer-events: none; white-space: pre-line; max-width: 72vw;
    }
    #status.err { color: #ffb4b4; }
    #hint {
      position: fixed; left: 50%; transform: translateX(-50%); bottom: 12px; z-index: 10;
      font: 12px/1.4 system-ui, sans-serif; color: #9aa4b2;
      background: rgba(13,17,23,0.5); padding: 6px 12px; border-radius: 8px;
      pointer-events: none; text-align: center; max-width: 92vw;
    }
    /* 錯誤浮層：任何例外不白屏，顯示紅字 */
    #err {
      position: fixed; inset: 0; z-index: 50; display: none;
      align-items: center; justify-content: center;
      font: 14px/1.6 system-ui, sans-serif; color: #ffb4b4;
      background: rgba(13,17,23,0.92); padding: 24px; text-align: center;
      white-space: pre-wrap;
    }

    /* ---- 觸控控制（手機才顯示，桌機用滑鼠鍵盤）---- */
    #touch { position: fixed; inset: 0; z-index: 20; display: none; pointer-events: none; }
    /* 左下虛擬搖桿底座 */
    #joy {
      position: absolute; left: 22px; bottom: 28px; width: 120px; height: 120px;
      border-radius: 50%; background: rgba(255,255,255,0.08);
      border: 2px solid rgba(255,255,255,0.18); pointer-events: auto; touch-action: none;
    }
    #joyNub {
      position: absolute; left: 35px; top: 35px; width: 50px; height: 50px;
      border-radius: 50%; background: rgba(255,255,255,0.35); pointer-events: none;
    }
    /* 右下跳躍鈕（純前端視覺跳，不影響 2D 玩法） */
    #jump {
      position: absolute; right: 24px; bottom: 36px; width: 92px; height: 92px;
      border-radius: 50%; background: rgba(255,213,74,0.22);
      border: 2px solid rgba(255,213,74,0.5); color: #ffd54a;
      font: bold 18px/92px system-ui, sans-serif; text-align: center;
      pointer-events: auto; touch-action: none; user-select: none; -webkit-user-select: none;
    }
    #jump:active { background: rgba(255,213,74,0.4); }

    /* ---- 照料世界·動作鈕（ROADMAP 618）：登入後可在 3D 裡親手種樹 ---- */
    #acts {
      position: fixed; right: 18px; bottom: 140px; z-index: 22;
      display: flex; flex-direction: column; gap: 10px; align-items: flex-end;
    }
    .act-btn {
      pointer-events: auto; touch-action: manipulation; user-select: none; -webkit-user-select: none;
      font: 600 15px/1 system-ui, -apple-system, "Noto Sans CJK TC", sans-serif;
      color: #173a1e; background: rgba(150, 220, 150, 0.92);
      border: 2px solid rgba(255,255,255,0.55); border-radius: 22px;
      padding: 12px 18px; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      transition: transform 0.08s ease, opacity 0.15s ease;
    }
    .act-btn:active { transform: scale(0.94); }
    .act-btn.locked { background: rgba(120,130,140,0.55); color: #cdd6e0; }
    /* ---- 動作回饋飄字（ROADMAP 618）：種樹後短暫浮現一句確認 ---- */
    #toast {
      position: fixed; left: 50%; top: 64px; transform: translateX(-50%);
      z-index: 30; pointer-events: none; opacity: 0;
      font: 600 14px/1.4 system-ui, "Noto Sans CJK TC", sans-serif; color: #eafff0;
      background: rgba(23, 58, 30, 0.86); padding: 8px 16px; border-radius: 20px;
      border: 1px solid rgba(150,220,150,0.5); max-width: 80vw; text-align: center;
      transition: opacity 0.25s ease;
    }
    #toast.show { opacity: 1; }
  </style>
  <!--
    Three.js 走 CDN importmap（比照原 /3d/ 與 /play3d/）。
    版本固定在 0.160.0，addons（CapsuleGeometry 等）走同版 jsm。
  -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="app"></div>
  <div id="hud">載入中…</div>
  <div id="status">連線中…</div>
  <div id="hint">WASD／搖桿 移動 · 拖曳轉鏡頭 · 空白鍵／跳鈕 跳 · T 種樹 · F 澆水 · H 收成</div>
  <div id="err"></div>

  <!-- 觸控控制層（main.js 偵測到觸控裝置才顯示） -->
  <div id="touch">
    <div id="joy"><div id="joyNub"></div></div>
    <div id="jump">跳</div>
  </div>

  <!-- 照料世界·動作鈕（ROADMAP 618 種樹 → 619 澆水／收成）：登入後可在 3D 親手照料農地；訪客顯示鎖定提示 -->
  <div id="acts">
    <button id="harvestBtn" class="act-btn locked" type="button">🌾 收成</button>
    <button id="waterBtn" class="act-btn locked" type="button">💧 澆水</button>
    <button id="plantBtn" class="act-btn locked" type="button">🌱 種樹</button>
  </div>
  <!-- 動作回饋飄字（種樹確認／訪客提示） -->
  <div id="toast"></div>

  <!-- 相對於 /3d/ 載入；?v 供 cache-bust -->
  <script type="module" src="main.js?v=6"></script>
</body>
</html>
