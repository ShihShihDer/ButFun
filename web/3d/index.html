<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <!-- 手機友善：禁止使用者縮放、滿版，OrbitControls 自己處理觸控縮放/旋轉 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>ButFun · 3D Spike（低多邊形即時世界）</title>
  <style>
    /* 沒風格的風格：純色背景、零美術資產，實體全在 main.js 程式生成 */
    html, body { margin: 0; height: 100%; overflow: hidden; background: #0d1117; }
    #app { position: fixed; inset: 0; }
    /* 連線/錯誤狀態浮層——連不上 WS 或沒資料時要看得到字，不白屏 */
    #status {
      position: fixed; left: 12px; top: 12px; z-index: 10;
      font: 13px/1.5 system-ui, -apple-system, "Noto Sans CJK TC", sans-serif;
      color: #e6edf3; background: rgba(13,17,23,0.72);
      padding: 8px 12px; border-radius: 8px; max-width: 70vw;
      pointer-events: none; white-space: pre-line;
    }
    #status.err { color: #ffb4b4; }
    #hint {
      position: fixed; right: 12px; bottom: 12px; z-index: 10;
      font: 12px/1.4 system-ui, sans-serif; color: #8b949e;
      background: rgba(13,17,23,0.6); padding: 6px 10px; border-radius: 8px;
      pointer-events: none;
    }
  </style>
  <!--
    Three.js 走 CDN importmap（spike 階段可接受；之後要穩定上線可改 vendored 進 web/wasm 同層）。
    版本固定在 0.160.0，addons（OrbitControls / CapsuleGeometry 等）走同版 jsm。
  -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="app"></div>
  <div id="status">連線中…</div>
  <div id="hint">拖曳旋轉 · 滾輪/雙指縮放 · 右鍵/雙指平移</div>
  <!-- 相對於 /3d/ 載入；頁面在 /3d/ 或 /3d/index.html 都解析成 /3d/main.js -->
  <script type="module" src="main.js?v=1"></script>
</body>
</html>
