<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>乙太方界 — ButFun</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #87b7e0; font-family: system-ui, sans-serif; }
    #app { position: fixed; inset: 0; }
    canvas { display: block; touch-action: none; }
    #hud {
      position: fixed; left: 10px; top: 10px; z-index: 5;
      background: rgba(20,28,40,0.55); color: #eaf2ff; padding: 8px 12px;
      border-radius: 10px; font-size: 13px; line-height: 1.5; max-width: 70vw;
      pointer-events: none; white-space: pre-line;
    }
    #err {
      position: fixed; left: 50%; top: 12px; transform: translateX(-50%); z-index: 9;
      background: rgba(150,30,30,0.9); color: #fff; padding: 6px 12px; border-radius: 8px;
      font-size: 13px; display: none; max-width: 90vw;
    }
    #dbg {
      position: fixed; right: 10px; top: 10px; z-index: 6;
      background: rgba(0,0,0,0.55); color: #9effa0; padding: 6px 10px;
      border-radius: 8px; font-size: 12px; font-family: ui-monospace, monospace;
      white-space: pre; display: none;
    }
    /* 觸控搖桿（只在觸控裝置顯示） */
    #touch { position: fixed; inset: 0; z-index: 4; display: none; pointer-events: none; }
    #joy {
      position: absolute; left: 24px; bottom: 28px; width: 120px; height: 120px;
      border-radius: 50%; background: rgba(255,255,255,0.12); border: 2px solid rgba(255,255,255,0.25);
      pointer-events: auto;
    }
    #joyNub {
      position: absolute; left: 35px; top: 35px; width: 50px; height: 50px;
      border-radius: 50%; background: rgba(255,255,255,0.45);
    }
    #jump {
      position: absolute; right: 30px; bottom: 40px; width: 84px; height: 84px;
      border-radius: 50%; background: rgba(255,255,255,0.22); border: 2px solid rgba(255,255,255,0.35);
      color: #fff; font-size: 15px; display: flex; align-items: center; justify-content: center;
      pointer-events: auto; user-select: none;
    }
    /* 放置鈕（手機右側，跳鈕上方）。破壞＝點準心，放置＝這顆。 */
    #place {
      position: absolute; right: 124px; bottom: 60px; width: 76px; height: 76px;
      border-radius: 50%; background: rgba(120,200,120,0.30); border: 2px solid rgba(255,255,255,0.4);
      color: #fff; font-size: 14px; display: flex; align-items: center; justify-content: center;
      pointer-events: auto; user-select: none;
    }
    /* 中央準心（對準你正在看的方塊）。永遠顯示。 */
    #crosshair {
      position: fixed; left: 50%; top: 50%; transform: translate(-50%, -50%); z-index: 7;
      width: 22px; height: 22px; pointer-events: none; opacity: 0.85;
    }
    #crosshair::before, #crosshair::after {
      content: ""; position: absolute; background: rgba(255,255,255,0.9);
      box-shadow: 0 0 2px rgba(0,0,0,0.8);
    }
    #crosshair::before { left: 50%; top: 0; width: 2px; height: 100%; transform: translateX(-50%); }
    #crosshair::after  { top: 50%; left: 0; height: 2px; width: 100%; transform: translateY(-50%); }
    /* 底部快捷欄：選要放的方塊型別。桌機/手機都顯示。 */
    #hotbar {
      position: fixed; left: 50%; bottom: 12px; transform: translateX(-50%); z-index: 8;
      display: flex; gap: 6px; padding: 6px; border-radius: 12px;
      background: rgba(20,28,40,0.55); pointer-events: auto;
    }
    .slot {
      width: 46px; height: 46px; border-radius: 8px; border: 2px solid rgba(255,255,255,0.25);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      color: #fff; font-size: 10px; line-height: 1.1; user-select: none; cursor: pointer;
    }
    .slot.sel { border-color: #ffd86b; box-shadow: 0 0 8px rgba(255,216,107,0.6); }
    .slot .sw { width: 22px; height: 22px; border-radius: 4px; margin-bottom: 2px; }
    /* 採集 v1：材料數量標籤（暖黃小字） */
    .slot .cnt { font-size: 9px; color: #ffd86b; line-height: 1; min-height: 1em; }
    /* 無材料：格子整體半透明暗示「需要先採集」 */
    .slot.empty { opacity: 0.55; }
    .slot.empty.sel { opacity: 1; border-color: #ff8f5a; box-shadow: 0 0 8px rgba(255,143,90,0.5); }

    /* ═══════════════════════════════════════════════════════════
       響應式排版：直式（portrait）優先、橫式（landscape）相容
       ═══════════════════════════════════════════════════════════
       直式佈局原則（MCPE 直式手機擺位邏輯，自行實作）：
         搖桿   → 左下角拇指區，在快捷欄上方
         跳鈕   → 右下角拇指區，在快捷欄上方，大觸控目標
         放置鈕 → 跳鈕左側，兩顆水平排列，皆在拇指可搆範圍
         快捷欄 → 底部置中，縮小格子確保 6 格在 320px+ 螢幕排得下
         頂部   → 精簡字型 + 窄 max-width，不換行亂掉
       ─────────────────────────────────────────────────────────── */

    @media (orientation: portrait) {
      /* 頂部狀態列：精簡，窄寬度不換行亂掉 */
      #hud {
        font-size: 11px;
        padding: 5px 9px;
        max-width: 48vw;
        line-height: 1.35;
      }
      #dbg { font-size: 11px; padding: 5px 8px; }

      /* 快捷欄：縮小格子，確保 9 格在 320px 螢幕排得下
         計算：9×32 + 8×3(gap) + 2×4(padding) = 288+24+8 = 320px ✓ */
      #hotbar { bottom: 8px; gap: 3px; padding: 4px; border-radius: 10px; }
      .slot   { width: 32px; height: 32px; font-size: 8px; border-radius: 6px; }
      .slot .sw { width: 14px; height: 14px; margin-bottom: 1px; }
      /* 快捷欄總高：38+5×2=48px；頂邊距底：8+48=56px from bottom */

      /* 搖桿：左下角，快捷欄上方（76 > 56，留 20px 間距）*/
      #joy { left: 16px; bottom: 76px; }

      /* 跳鈕：右下角，快捷欄上方，大觸控目標（80×80px）*/
      #jump { right: 16px; bottom: 76px; width: 80px; height: 80px; font-size: 14px; }

      /* 放置鈕：跳鈕左側，兩顆水平排列、不重疊
         在 390px 螢幕：place 右邊=282px，jump 左邊=294px，間距 12px ✓ */
      #place { right: 108px; bottom: 76px; width: 72px; height: 72px; font-size: 13px; }
    }

    /* 超窄裝置備援（< 360px 寬）：9×28 + 8×2 + 2×3 = 274px ≤ 320px ✓ */
    @media (orientation: portrait) and (max-width: 359px) {
      .slot   { width: 28px; height: 28px; font-size: 7px; }
      #hotbar { gap: 2px; padding: 3px; }
      #place  { right: 100px; }
    }

    /* ── 居民對話框：底部直式小面板，手機友善、不擋全畫面、可關 ── */
    #chat {
      position: fixed; left: 50%; bottom: 64px; transform: translateX(-50%);
      z-index: 10; width: min(420px, 92vw); max-height: 46vh;
      display: none; flex-direction: column;
      background: rgba(20,28,40,0.92); color: #eaf2ff; border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.15); box-shadow: 0 6px 24px rgba(0,0,0,0.4);
      overflow: hidden;
    }
    #chatHead {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 12px; background: rgba(255,255,255,0.08); font-weight: bold; font-size: 14px;
    }
    #chatClose {
      cursor: pointer; user-select: none; font-size: 18px; line-height: 1;
      padding: 2px 9px; border-radius: 8px; background: rgba(255,255,255,0.12);
    }
    #chatLog {
      flex: 1; overflow-y: auto; padding: 10px 12px; font-size: 13px; line-height: 1.5;
      display: flex; flex-direction: column; gap: 6px; min-height: 56px;
    }
    .msg { padding: 6px 10px; border-radius: 10px; max-width: 85%; white-space: pre-wrap; word-break: break-word; }
    .msg.me  { align-self: flex-end; background: rgba(255,216,107,0.22); }
    .msg.npc { align-self: flex-start; background: rgba(143,208,255,0.18); }
    .msg.sys { align-self: center; color: #9fb0c8; font-size: 12px; background: none; padding: 2px; }
    /* 思考中指示器：灰色、斜體、樣式明顯不同於真回覆氣泡 */
    .msg.thinking {
      align-self: flex-start; display: flex; align-items: center; gap: 6px;
      background: rgba(255,255,255,0.06); border: 1px dashed rgba(255,255,255,0.15);
      color: #8aaccc; font-style: italic; font-size: 12px;
    }
    .thinking-label { opacity: 0.85; }
    /* 跳動點點：三顆依序縮放，純 CSS 不需 JS timer */
    .thinking-dots::before { content: "●●●"; letter-spacing: 2px; }
    .thinking-dots {
      display: inline-block; letter-spacing: 2px;
      animation: thinkDots 1.2s ease-in-out infinite;
    }
    @keyframes thinkDots {
      0%,100% { opacity: 0.2; transform: scale(0.8); }
      50%      { opacity: 1;   transform: scale(1.1); }
    }
    #chatQuick { display: flex; gap: 6px; padding: 0 12px 6px; flex-wrap: wrap; }
    .qbtn {
      padding: 5px 10px; border-radius: 14px; background: rgba(255,255,255,0.12);
      font-size: 12px; cursor: pointer; user-select: none; border: 1px solid rgba(255,255,255,0.18);
    }
    #chatInputRow { display: flex; gap: 6px; padding: 8px 10px; background: rgba(0,0,0,0.18); }
    #chatInput {
      flex: 1; min-width: 0; padding: 8px 10px; border-radius: 10px; border: none;
      font-size: 14px; background: rgba(255,255,255,0.95); color: #1a2230;
    }
    #chatSend {
      padding: 8px 14px; border-radius: 10px; border: none; background: #ffd86b;
      color: #2a2410; font-weight: bold; font-size: 14px; cursor: pointer;
    }
    /* 聊天框頂列：居民名 + 日記鈕 + 關閉鈕 */
    #chatDiary {
      cursor: pointer; user-select: none; font-size: 13px; padding: 3px 9px;
      border-radius: 8px; background: rgba(180,240,200,0.18);
      border: 1px solid rgba(180,240,200,0.35); color: #a0e8b0;
    }
    #chatDiary:hover { background: rgba(180,240,200,0.28); }
    @media (orientation: portrait) { #chat { bottom: 60px; max-height: 50vh; } }

    /* ── 居民日記面板 ─────────────────────────────────────────────────────── */
    #diary {
      position: fixed; left: 50%; top: 50%; transform: translate(-50%, -50%);
      z-index: 20; width: min(480px, 94vw); max-height: 80vh;
      display: none; flex-direction: column;
      background: rgba(16,22,34,0.95); color: #eaf2ff; border-radius: 16px;
      border: 1px solid rgba(160,232,176,0.25); box-shadow: 0 8px 32px rgba(0,0,0,0.55);
      overflow: hidden;
    }
    #diaryHead {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px; background: rgba(160,232,176,0.08); font-weight: bold; font-size: 15px;
    }
    #diaryHeadLeft { display: flex; align-items: center; gap: 8px; }
    #diaryIcon { font-size: 20px; }
    #diaryTitle { color: #a0e8b0; }
    #diaryClose {
      cursor: pointer; user-select: none; font-size: 18px; line-height: 1;
      padding: 2px 9px; border-radius: 8px; background: rgba(255,255,255,0.10);
    }
    #diaryBody {
      flex: 1; overflow-y: auto; padding: 14px 16px; font-size: 13px; line-height: 1.65;
      display: flex; flex-direction: column; gap: 12px;
    }
    .diary-desire {
      padding: 8px 12px; border-radius: 10px;
      background: rgba(255,216,107,0.12); border-left: 3px solid rgba(255,216,107,0.6);
      font-style: italic; color: #ffe5a0; font-size: 13px;
    }
    .diary-desire-label { font-size: 11px; opacity: 0.6; margin-bottom: 3px; }
    .diary-no-desire { color: #607080; font-size: 12px; font-style: italic; }
    .diary-section-title {
      font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
      color: #6080a0; margin-top: 4px;
    }
    .diary-entry {
      display: flex; gap: 10px; align-items: flex-start;
      padding: 7px 10px; border-radius: 8px; background: rgba(255,255,255,0.04);
    }
    .diary-entry-player {
      font-size: 11px; color: #8aaccc; white-space: nowrap; min-width: 52px;
      flex-shrink: 0; padding-top: 1px;
    }
    .diary-entry-text { color: #d0e4f4; font-size: 13px; }
    .diary-empty { color: #506070; font-size: 12px; font-style: italic; padding: 4px 0; }
    @media (orientation: portrait) {
      #diary { top: auto; bottom: 10px; transform: translateX(-50%); max-height: 70vh; }
    }

    /* ── 城鎮動態 Feed（ROADMAP 655）────────────────────────────────────────── */
    #feedBtn {
      position: fixed; right: 10px; top: 10px; z-index: 6;
      background: rgba(20,28,40,0.65); color: #a0d4f8; border: 1px solid rgba(160,212,248,0.3);
      padding: 6px 11px; border-radius: 8px; font-size: 13px; cursor: pointer;
      user-select: none; pointer-events: auto;
    }
    #feedBtn:hover { background: rgba(40,60,90,0.75); }
    #feed {
      position: fixed; right: 10px; top: 46px; z-index: 20;
      width: min(340px, 94vw); max-height: 70vh;
      display: none; flex-direction: column;
      background: rgba(16,22,34,0.95); color: #eaf2ff; border-radius: 14px;
      border: 1px solid rgba(160,212,248,0.22); box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      overflow: hidden;
    }
    #feedHead {
      display: flex; align-items: center; justify-content: space-between;
      padding: 9px 13px; background: rgba(160,212,248,0.07); font-size: 14px; font-weight: bold;
    }
    #feedTitle { color: #a0d4f8; }
    #feedClose {
      cursor: pointer; user-select: none; font-size: 18px; line-height: 1;
      padding: 2px 8px; border-radius: 8px; background: rgba(255,255,255,0.10);
    }
    #feedBody {
      flex: 1; overflow-y: auto; padding: 10px 13px;
      display: flex; flex-direction: column; gap: 8px; font-size: 13px;
    }
    .feed-item {
      padding: 7px 10px; border-radius: 10px; background: rgba(255,255,255,0.05);
      border-left: 3px solid rgba(160,212,248,0.3);
      display: flex; flex-direction: column; gap: 3px;
    }
    .feed-item.kind-新心願   { border-left-color: rgba(255,216,107,0.6); }
    .feed-item.kind-念頭種下  { border-left-color: rgba(180,100,255,0.6); }
    .feed-item.kind-鄰里閒聊  { border-left-color: rgba(100,220,180,0.6); }
    .feed-item.kind-蓋家動工  { border-left-color: rgba(255,160,80,0.6); }
    .feed-item.kind-蓋家完工  { border-left-color: rgba(80,220,120,0.7); }
    .feed-who { font-size: 12px; color: #8ab8d8; display: flex; justify-content: space-between; }
    .feed-who-kind { font-weight: bold; }
    .feed-who-time { opacity: 0.6; font-size: 11px; }
    .feed-detail { color: #c8dff0; font-size: 13px; line-height: 1.4; }
    .feed-empty { color: #506070; font-size: 12px; font-style: italic; padding: 4px 0; text-align: center; }
    @media (orientation: portrait) {
      #feedBtn { top: auto; bottom: 64px; right: 10px; }
      #feed { top: auto; bottom: 108px; right: 10px; max-height: 55vh; }
    }

    /* ── 成功提示（綠色小吐司）──────────────────────────────────────────── */
    #msg {
      position: fixed; left: 50%; top: 58px; transform: translateX(-50%);
      z-index: 15; background: rgba(60,180,90,0.92); color: #fff;
      padding: 6px 14px; border-radius: 8px; font-size: 13px;
      display: none; white-space: nowrap; box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      pointer-events: none;
    }

    /* ── 合成台按鈕（右側頂部，類 feedBtn）───────────────────────────────── */
    #craftBtn {
      position: fixed; right: 10px; top: 52px; z-index: 6;
      background: rgba(20,28,40,0.65); color: #f0d080;
      border: 1px solid rgba(240,208,128,0.3);
      padding: 6px 11px; border-radius: 8px; font-size: 13px; cursor: pointer;
      user-select: none; pointer-events: auto;
    }
    #craftBtn:hover { background: rgba(60,50,20,0.75); }

    /* ── 合成台面板（ROADMAP 658）────────────────────────────────────────── */
    #craft {
      position: fixed; left: 50%; top: 50%; transform: translate(-50%, -50%);
      z-index: 20; width: min(400px, 94vw); max-height: 80vh;
      display: none; flex-direction: column;
      background: rgba(16,22,34,0.95); color: #eaf2ff; border-radius: 16px;
      border: 1px solid rgba(240,208,128,0.25); box-shadow: 0 8px 32px rgba(0,0,0,0.55);
      overflow: hidden;
    }
    #craftHead {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px; background: rgba(240,208,128,0.08); font-weight: bold; font-size: 15px;
    }
    #craftTitle { color: #f0d080; }
    #craftClose {
      cursor: pointer; user-select: none; font-size: 18px; line-height: 1;
      padding: 2px 9px; border-radius: 8px; background: rgba(255,255,255,0.10);
    }
    #craftBody {
      flex: 1; overflow-y: auto; padding: 12px 14px;
      display: flex; flex-direction: column; gap: 8px; font-size: 13px;
    }
    .craft-row {
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
      padding: 8px 10px; border-radius: 10px; background: rgba(255,255,255,0.05);
    }
    .craft-row.craft-disabled { opacity: 0.55; }
    .craft-inp { display: flex; gap: 5px; flex-wrap: wrap; align-items: center; }
    .craft-mat { padding: 2px 7px; border-radius: 6px; font-size: 12px; }
    .craft-mat.ok    { background: rgba(80,200,100,0.20); color: #80e898; border: 1px solid rgba(80,200,100,0.3); }
    .craft-mat.short { background: rgba(255,120,60,0.18); color: #ff9060; border: 1px solid rgba(255,120,60,0.3); }
    .craft-arr { color: #8090a8; font-size: 14px; flex-shrink: 0; }
    .craft-out { display: flex; align-items: center; gap: 5px; font-size: 13px; color: #d8ecfc; flex: 1; min-width: 80px; }
    .craft-swatch { width: 16px; height: 16px; border-radius: 3px; flex-shrink: 0; border: 1px solid rgba(255,255,255,0.2); }
    .craft-btn {
      margin-left: auto; padding: 5px 12px; border-radius: 8px; border: none;
      background: rgba(255,216,107,0.85); color: #2a2410; font-weight: bold;
      font-size: 13px; cursor: pointer; flex-shrink: 0;
    }
    .craft-btn:disabled { background: rgba(120,110,80,0.45); color: #888; cursor: not-allowed; }
    .craft-btn:not(:disabled):hover { background: #ffd86b; }
    @media (orientation: portrait) {
      #craftBtn { top: auto; bottom: 104px; right: 10px; }
      #craft { top: auto; transform: translateX(-50%); bottom: 10px; max-height: 65vh; }
    }
  </style>
  <!-- Three.js 走 CDN importmap（比照 /3d/ 與 /play3d/）。 -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
    }
  }
  </script>
</head>
<body>
  <div id="app"></div>
  <div id="hud">載入中…</div>
  <div id="dbg"></div>
  <div id="err"></div>
  <div id="msg"></div>
  <div id="crosshair"></div>
  <!-- 快捷欄槽位由 main.js 依方塊型別動態生成 -->
  <div id="hotbar"></div>
  <div id="touch">
    <div id="joy"><div id="joyNub"></div></div>
    <div id="place">放置</div>
    <div id="jump">跳</div>
  </div>
  <!-- 居民對話框（點居民開啟；內容由 main.js 填）-->
  <div id="chat">
    <div id="chatHead">
      <span id="chatTitle">居民</span>
      <div style="display:flex;gap:6px;align-items:center">
        <span id="chatDiary">📖 日記</span>
        <span id="chatClose">✕</span>
      </div>
    </div>
    <div id="chatLog"></div>
    <div id="chatQuick"></div>
    <div id="chatInputRow">
      <input id="chatInput" type="text" maxlength="200" placeholder="跟居民說點什麼…" autocomplete="off" />
      <button id="chatSend">送出</button>
    </div>
  </div>
  <!-- 居民日記面板（ROADMAP 650）-->
  <div id="diary">
    <div id="diaryHead">
      <div id="diaryHeadLeft"><span id="diaryIcon">📖</span><span id="diaryTitle">居民日記</span></div>
      <span id="diaryClose">✕</span>
    </div>
    <div id="diaryBody"></div>
  </div>
  <!-- 合成台按鈕（ROADMAP 658）-->
  <button id="craftBtn">🔨 合成</button>
  <!-- 城鎮動態 Feed（ROADMAP 655）-->
  <div id="feedBtn">🌐 動態</div>
  <div id="feed">
    <div id="feedHead">
      <span id="feedTitle">🌐 世界動態</span>
      <span id="feedClose">✕</span>
    </div>
    <div id="feedBody"></div>
  </div>
  <!-- 合成台面板（ROADMAP 658）-->
