<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>ButFun — 邊境星拓荒</title>
  <style>
    :root { --ink: #e8e0cf; --brass: #c9a24b; --panel: rgba(20, 24, 30, 0.85); }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; overflow: hidden; background: #0b0d12;
      font-family: system-ui, "Noto Sans TC", sans-serif; color: var(--ink); }
    #game { display: block; width: 100vw; height: 100vh; touch-action: none; }

    /* 進場畫面 */
    #login {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px;
      background: radial-gradient(circle at 50% 30%, #1a2230, #0b0d12 70%); z-index: 10;
    }
    #login h1 { color: var(--brass); margin: 0; font-size: 2rem; letter-spacing: 2px; }
    #login p { opacity: 0.7; margin: 0 0 8px; max-width: 320px; text-align: center; line-height: 1.6; }
    #login input, #login select, #login button, #chatText, .modal input, .modal textarea, .modal button {
      font: inherit; padding: 10px 14px; border-radius: 8px; border: 1px solid #3a4250;
      background: #161b22; color: var(--ink);
    }
    #login button, .modal button.primary {
      background: var(--brass); color: #1a1206; border: none; font-weight: 700; cursor: pointer;
    }
    #login button:hover { filter: brightness(1.1); }

    /* HUD */
    #hud { position: fixed; left: 12px; top: 12px; z-index: 5; font-size: 0.85rem;
      background: var(--panel); padding: 8px 12px; border-radius: 8px; line-height: 1.5; }
    #hud .brass { color: var(--brass); }

    /* 聊天 */
    #chat { position: fixed; left: 12px; bottom: 12px; width: min(360px, 70vw); z-index: 5; }
    #chatLog { max-height: 30vh; overflow-y: auto; background: var(--panel); border-radius: 8px;
      padding: 8px 10px; margin-bottom: 6px; font-size: 0.85rem; line-height: 1.5; display: none; }
    #chatLog .who { color: var(--brass); font-weight: 600; }
    #chatForm { display: flex; gap: 6px; }
    #chatText { flex: 1; }

    /* 建議箱按鈕 + modal */
    #suggestBtn { position: fixed; right: 12px; top: 12px; z-index: 5; cursor: pointer; }
    .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 20;
      display: none; align-items: center; justify-content: center; }
    .modal { background: #11151c; border: 1px solid #3a4250; border-radius: 12px;
      padding: 20px; width: min(420px, 90vw); display: flex; flex-direction: column; gap: 10px; }
    .modal h2 { margin: 0; color: var(--brass); font-size: 1.2rem; }
    .modal p { margin: 0; opacity: 0.7; font-size: 0.85rem; }
    .modal textarea { resize: vertical; min-height: 90px; }
    .modal .row { display: flex; gap: 8px; justify-content: flex-end; }
    .modal button { cursor: pointer; }
    #suggestStatus { font-size: 0.85rem; min-height: 1.2em; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <canvas id="game"></canvas>

  <div id="login">
    <h1>ButFun</h1>
    <p>「大靜默」之後，乙太緩緩回流。你回到這顆邊境星，準備在廢墟上重建家園。</p>
    <input id="nameInput" maxlength="24" placeholder="你的名字" autocomplete="off" />
    <select id="speciesInput">
      <option value="terran">地球人（索爾人）— 繼承農莊</option>
      <option value="shilaya" disabled>施拉雅人（商會飛船）— 即將開放</option>
      <option value="busi" disabled>布司人（礦星齒輪）— 即將開放</option>
      <option value="lumen" disabled>燐光族（乙太霧星）— 即將開放</option>
    </select>
    <button id="joinBtn">登入邊境星</button>
  </div>

  <div id="hud" class="hidden">
    <div><span class="brass">ButFun</span> · 邊境星地表</div>
    <div id="hudPlayers">線上：—</div>
    <div style="opacity:.6">WASD / 方向鍵移動 · Enter 聊天</div>
  </div>

  <div id="suggestBtn" class="hidden"><button>💡 給點建議</button></div>

  <div id="chat" class="hidden">
    <div id="chatLog"></div>
    <form id="chatForm" autocomplete="off">
      <input id="chatText" maxlength="200" placeholder="說點什麼…（Enter 送出）" />
    </form>
  </div>

  <div id="suggestModal" class="modal-bg">
    <div class="modal">
      <h2>給點建議</h2>
      <p>你希望這個世界長成什麼樣子？我會收到，然後改版。</p>
      <input id="suggestFrom" maxlength="24" placeholder="你的稱呼（可留空）" />
      <textarea id="suggestText" maxlength="1000" placeholder="想加什麼、哪裡卡卡的、什麼好玩…"></textarea>
      <div id="suggestStatus"></div>
      <div class="row">
        <button id="suggestCancel">取消</button>
        <button id="suggestSend" class="primary">送出建議</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
